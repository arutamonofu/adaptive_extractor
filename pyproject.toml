[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autoevoextractor"
version = "0.4.0"
description = "Evolutionary self-optimizing system for scientific data extraction"
requires-python = ">=3.11"
dependencies = [
    "dspy-ai>=2.4.4,<4.0.0",
    "pydantic>=2.7.1,<3.0.0",
    "pydantic-settings>=2.0.0,<3.0.0",
    "pandas>=2.0.0,<3.0.0",
    "pyyaml>=6.0,<7.0",
    "requests>=2.28.0,<3.0.0",
    "numpy>=1.24.0,<3.0.0",
    "scipy>=1.10.0,<2.0.0",
    "docling>=2.0.0,<3.0.0",
    "docling-core>=2.0.0,<3.0.0",
    "marker-pdf>=1.0.0,<2.0.0",
    "streamlit>=1.28.0,<2.0.0",
    "mlflow>=2.10.0,<3.0.0",
    "python-dotenv>=1.0.0,<2.0.0"
]

[tool.setuptools.packages.find]
where = ["src"]