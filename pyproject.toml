[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autoevoextractor"
version = "0.4.0"
description = "Evolutionary self-optimizing system for scientific data extraction"
requires-python = ">=3.11"
dependencies = [
    # LLM Framework
    "dspy-ai>=2.4.4,<4.0.0",
    
    # Validation and configuration
    "pydantic>=2.7.1,<3.0.0",
    "pydantic-settings>=2.0.0,<3.0.0",
    "pyyaml>=6.0,<7.0",
    "python-dotenv>=1.0.0,<2.0.0",
    
    # Data processing and scientific computing
    "pandas>=2.0.0,<3.0.0",
    "numpy>=1.24.0,<3.0.0",
    "scipy>=1.10.0,<2.0.0",

    # Jupyter
    "jupyterlab>=4.0.0,<5.0.0",
    "notebook>=7.0.0,<8.0.0",
    "ipykernel>=6.25.0,<7.0.0",
    "ipywidgets>=8.0.0,<9.0.0",
    
    # HTTP client
    "requests>=2.28.0,<3.0.0",
    
    # PDF parsing
    "docling>=2.0.0,<3.0.0",
    "docling-core>=2.0.0,<3.0.0",
    "marker-pdf>=1.0.0,<2.0.0",
    "pypdf>=3.0.0,<6.0.0",
    "onnxruntime>=1.15.0,<2.0.0",
    
    # ML and transformers
    "transformers>=4.30.0,<5.0.0",
    "scikit-learn>=1.0.0,<2.0.0",
    "umap-learn>=0.5.0,<1.0.0",
    
    # Visualization
    "matplotlib>=3.7.0,<4.0.0",
    "seaborn>=0.12.0,<1.0.0",
    
    # Experiment tracking and UI
    "mlflow>=2.10.0,<3.0.0",
    "streamlit>=1.28.0,<2.0.0",
    
    # Utilities
    "tabulate>=0.9.0,<1.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]