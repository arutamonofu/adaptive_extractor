name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTEST_ADDOPTS: "--color=yes"
  MAMBA_ROOT_PREFIX: "${{ github.workspace }}/.micromamba"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        # Login shell обязательно для корректной работы micromamba activate
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: "latest"
          init-shell: bash

      - name: Cache conda environment
        uses: actions/cache@v4
        id: cache-conda
        with:
          path: ${{ env.MAMBA_ROOT_PREFIX }}/envs/aee
          key: ${{ runner.os }}-conda-aee-${{ hashFiles('conda-lock.yml') }}
          restore-keys: ${{ runner.os }}-conda-aee-

      - name: Install environment from conda-lock
        if: steps.cache-conda.outputs.cache-hit != 'true'
        run: micromamba create -n aee --file conda-lock.yml

      - name: Install local package
        run: |
          micromamba activate aee
          # --no-deps: зависимости уже зафиксированы в lock-файле
          pip install --no-deps -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -v -n auto --cov=src/aee --cov-report=xml --cov-report=term-missing -m unit

      - name: Run integration tests
        run: pytest tests/integration -v -m "integration and not slow" --cov=src/aee --cov-report=xml --cov-report=term-missing --cov-append

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: tests
          name: codecov-ubuntu
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: "latest"
          init-shell: bash

      - name: Cache conda environment
        uses: actions/cache@v4
        id: cache-conda-lint
        with:
          path: ${{ env.MAMBA_ROOT_PREFIX }}/envs/aee
          key: ${{ runner.os }}-conda-aee-${{ hashFiles('conda-lock.yml') }}
          restore-keys: ${{ runner.os }}-conda-aee-

      - name: Install environment from conda-lock
        if: steps.cache-conda-lint.outputs.cache-hit != 'true'
        run: micromamba create -n aee --file conda-lock.yml

      - name: Install local package & lint tools
        run: |
          micromamba activate aee
          pip install --no-deps -e ".[dev]"
          # Линтеры не входят в conda-lock, ставим через pip
          pip install flake8 mypy ruff

      - name: Run ruff check
        run: ruff check src/aee tests

      - name: Run flake8
        run: |
          flake8 src/aee tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/aee tests --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics

      - name: Run mypy
        run: mypy src/aee --ignore-missing-imports --no-strict-optional --no-error-summary

  build:
    name: Build & Install
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: "latest"
          init-shell: bash

      - name: Cache conda environment
        uses: actions/cache@v4
        id: cache-conda-build
        with:
          path: ${{ env.MAMBA_ROOT_PREFIX }}/envs/aee
          key: ${{ runner.os }}-conda-aee-${{ hashFiles('conda-lock.yml') }}
          restore-keys: ${{ runner.os }}-conda-aee-

      - name: Install environment from conda-lock
        if: steps.cache-conda-build.outputs.cache-hit != 'true'
        run: micromamba create -n aee --file conda-lock.yml

      - name: Install build dependencies
        run: |
          micromamba activate aee
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package with twine
        run: twine check dist/*

      - name: Install from wheel
        run: |
          micromamba activate aee
          # --no-deps предотвращает попытку pip пересобрать flash-attn/bitsandbytes
          pip install --no-deps dist/*.whl