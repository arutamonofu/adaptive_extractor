name: aee
channels:
  - conda-forge
  - defaults

dependencies:
  # Python and base utilities
  - python=3.11
  - pip

  # Data processing and scientific computing
  - pandas>=2.0.0,<3.0.0
  - numpy>=1.24.0,<3.0.0
  - scipy>=1.10.0,<2.0.0

  # Jupyter
  - jupyterlab>=4.0.0,<5.0.0
  - notebook>=7.0.0,<8.0.0
  - ipykernel>=6.25.0,<7.0.0
  - ipywidgets>=8.0.0,<9.0.0

  # ML and transformers
  - scikit-learn>=1.0.0,<2.0.0
  - transformers>=4.30.0,<5.0.0

  # Visualization
  - matplotlib>=3.7.0,<4.0.0
  - seaborn>=0.12.0,<1.0.0

  # Validation and configuration
  - pydantic>=2.7.1,<3.0.0
  - pydantic-settings>=2.0.0,<3.0.0
  - pyyaml>=6.0,<7.0
  - python-dotenv>=1.0.0,<2.0.0

  # HTTP client
  - requests>=2.28.0,<3.0.0

  # Dimensionality reduction
  - umap-learn>=0.5.0,<1.0.0

  # Utilities
  - tabulate>=0.9.0,<1.0.0

  # Installed via pip (not available in conda-forge)
  - pip:
      # LLM Framework
      - dspy-ai>=2.4.4,<4.0.0

      # PDF parsing
      - marker-pdf>=1.0.0,<2.0.0
      - pypdf>=3.0.0,<6.0.0
      - onnxruntime>=1.15.0,<2.0.0

      # Experiment tracking and UI
      - mlflow>=2.10.0,<3.0.0
      - streamlit>=1.28.0,<2.0.0
