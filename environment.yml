name: aee
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pandas
  - numpy
  - scipy
  - tqdm
  - pytorch
  - cpuonly
  - pip:
      - dspy-ai>=2.5.0
      - pydantic>=2.0
      - pydantic-settings
      - pyyaml
      - python-dotenv
      - requests
      - docling
      - marker-pdf
      - onnxruntime
      - rapidocr-onnxruntime
      - huggingface_hub
      - python-levenshtein
      - jupyterlab
      - ipywidgets