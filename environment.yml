name: aee
channels:
  - conda-forge
  - defaults

dependencies:
  # Python and base utilities
  - python=3.12
  - pip
  - setuptools

  # Data processing and scientific computing
  - numpy>=1.26.0
  - pandas>=2.0.0
  - scipy>=1.11.0

  # Jupyter
  - jupyterlab>=4.0.0
  - notebook>=7.0.0
  - ipykernel>=6.25.0
  - ipywidgets>=8.0.0

  # ML and transformers
  - scikit-learn>=1.3.0
  - transformers>=4.40.0  # Use >=5.0 for Qwen 3.5 (qwen3_5 architecture)
  - sentence-transformers>=2.2.0
  - pytorch>=2.0.0
  - accelerate>=0.27.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # Validation and configuration
  - pydantic>=2.7.1
  - pydantic-settings>=2.0.0
  - pyyaml>=6.0
  - python-dotenv>=1.0.0

  # HTTP client
  - requests>=2.28.0

  # Dimensionality reduction
  - umap-learn>=0.5.0

  # Utilities
  - tabulate>=0.9.0

  # Installed via pip (not available in conda-forge or require specific versions)
  - pip:
      # LLM Framework
      - dspy-ai>=2.4.4

      # PDF parsing (optional — requires transformers < 5.0)
      # If using transformers >= 5.0, use parser: "gemini" instead.
      # - marker-pdf>=1.0.0
      # - onnxruntime-gpu>=1.15.0
      - pypdf>=3.0.0

      # Experiment tracking and UI
      - mlflow>=2.10.0
      - streamlit>=1.28.0

      # Google Gemini API (for parser: "gemini")
      - google-genai>=1.0.0

      # Statistical modeling (for power analysis)
      - statsmodels>=0.14.0

      # Development tools
      - pytest>=7.0.0
      - pytest-cov>=4.0.0
      - pytest-xdist>=3.0.0
      - responses>=0.23.0
      - ruff>=0.1.0
      - mypy>=1.0.0
      - flake8>=6.0.0
