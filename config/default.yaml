# config/default.yaml
#
# Configuration priority (highest → lowest):
# 1. Environment variables (.env)
# 2. YAML files (this file)
# 3. Internal defaults

project:
  name: "autoevoextractor"

llm:
  student:
    use_ollama: true
    model: "gpt-oss:120b"
    timeout: 600
    max_retries: 5
    temperature: 0.0
    rate_limit_delay: 10.0
    top_p: 0.1
    repeat_penalty: 1.2
    repeat_last_n: 2048
    enable_cache: true
    ollama:
      # URL is set via OLLAMA_STUDENT_BASE_URL env var, this is fallback
      ollama_base_url: "http://localhost:11434"
      num_ctx: 128000
      num_predict: 4096
      repeat_penalty: 1.2
      repeat_last_n: 2048
      stream: true
    non_ollama:
      max_tokens: 4096

  teacher:
    use_ollama: true
    model: "gpt-oss:120b"
    timeout: 600
    max_retries: 2
    temperature: 0.5
    rate_limit_delay: 10.0
    top_p: 0.9
    repeat_penalty: 1.1
    repeat_last_n: 512
    enable_cache: true
    ollama:
      # URL is set via OLLAMA_TEACHER_BASE_URL env var, this is fallback
      ollama_base_url: "http://localhost:11434"
      num_ctx: 100000
      num_predict: 8192
      repeat_penalty: 1.1
      repeat_last_n: 512
      stream: true
    non_ollama:
      max_tokens: 8192

parsing:
  parser: "docling"
  overwrite: false
  docling:
    device: "cpu"
    num_threads: 4
    do_ocr: true
    do_table_structure: true
  marker:
    device: "cpu"

paths:
  pdf_dir: "data/pdf"
  parsed_dir: "data/parsed"
  ground_truth_dir: "data/ground_truth"
  splits_file: "data/splits/nanozymes.json"
  agents_dir: "data/agents"
  extractions_dir: "data/extractions"
  logs_dir: "logs"

optimization:
  total_load: 20
  train_split: 20
  num_candidates: 10
  num_trials: 70
  max_bootstrapped_demos: 2
  max_labeled_demos: 2
  minibatch: false
  minibatch_size: 10
  view_data_batch_size: 3
  metric_threshold: 1.0
  init_temperature: 0.5
  random_seed: 42
  use_cache: true
  verbose: true

task:
  name: "nanozymes"
  initial_instruction_file: "config/initial_instructions/nanozymes_sota.txt"
  evaluation:
    float_tolerance: 0.05
    compare_fields:
      - "formula"
      - "activity"
      - "reaction_type"
      - "ph"
      - "temperature"
      - "surface"
      - "syngony"
      - "length"
      - "width"
      - "depth"
      - "km_value"
      - "vmax_value"
      - "c_min"
      - "c_max"
      - "c_const"
      - "ccat_value"
      - "km_unit"
      - "vmax_unit"
      - "c_const_unit"
      - "ccat_unit"

extraction:
  enable_cache: false

cache:
  disk_size_limit_bytes: 30000000000  # 30 GB
  memory_max_entries: 1000000

circuit_breaker:
  failure_threshold: 5
  reset_timeout: 60.0
  half_open_max_calls: 1
