# Task configuration for nanozyme extraction

name: nanozymes

fields:
  formula:
    type: str
    description: "Inorganic chemical composition exactly as explicitly reported in the text, excluding organic coatings and modifiers, while including inorganic composites and alloys"
    required: true

  activity:
    type: str
    description: "Catalytic activity type determined from the experimental assay methodology, not from author claims"
    required: true
    choices: [peroxidase, oxidase, catalase, laccase, glucose oxidase]

  syngony:
    type: str
    description: "Crystal system explicitly stated as a word in the article text"
    choices: [cubic, hexagonal, tetragonal, monoclinic, orthorhombic, trigonal, triclinic, amorphous, rhombohedral, '0']
    required: false

  length:
    type: str
    description: "Particle length or size dimension exactly as reported from TEM or SEM measurements of the final nanozyme"
    required: false
  length_unit:
    type: str
    description: "Unit of measurement for particle length exactly as reported in the text"
    required: false

  width:
    type: str
    description: "Particle width exactly as reported from TEM or SEM measurements of the final nanozyme"
    required: false
  width_unit:
    type: str
    description: "Unit of measurement for particle width exactly as reported in the text"
    required: false

  depth:
    type: str
    description: "Particle thickness or third dimension exactly as reported from TEM or SEM measurements of the final nanozyme"
    required: false
  depth_unit:
    type: str
    description: "Unit of measurement for particle depth/thickness exactly as reported in the text"
    required: false

  surface:
    type: str
    description: "Component explicitly present in the final nanozyme material that corresponds to an organic or molecular surface/interface component, including integrated templates or stabilizers/surfactants/ions ONLY if they are explicitly part of the final material identity (name or composition) as described in the article"
    required: false

  km_value:
    type: str
    description: "Km value exactly as reported"
    required: false
  km_unit:
    type: str
    description: "Km unit exactly as reported"
    required: false

  vmax_value:
    type: str
    description: "Vmax value exactly as reported"
    required: false
  vmax_unit:
    type: str
    description: "Vmax unit exactly as reported"
    required: false

  reaction_type:
    type: str
    description: "Reaction system formatted STRICTLY as [Substrate] or [Substrate] + [Co-substrate] including only explicitly added liquid or solid reagents, excluding gases (e.g., O2), and containing at most two components"
    required: false

  c_min:
    type: str
    description: "Minimum value of the varied component exactly as reported"
    required: false
  c_min_unit:
    type: str
    description: "Unit of the minimum value of the varied component exactly as reported"
    required: false

  c_max:
    type: str
    description: "Maximum value of the varied component exactly as reported"
    required: false
  c_max_unit:
    type: str
    description: "Unit of the maximum value of the varied component exactly as reported"
    required: false

  c_const:
    type: str
    description: "Value of the constant component exactly as explicitly reported in the kinetic measurement setup, including stock or working solutions ONLY if they are explicitly used in the kinetic assay"
    required: false
  c_const_unit:
    type: str
    description: "Unit of the constant component exactly as reported"
    required: false

  ccat_value:
    type: str
    description: "Catalyst amount or concentration exactly as explicitly reported in the kinetic experiment, including stock or working solutions ONLY if explicitly added in the assay"
    required: false
  ccat_unit:
    type: str
    description: "Unit of the catalyst value exactly as reported"
    required: false

  ph:
    type: str
    description: "pH value explicitly reported for the kinetic experiment"
    required: false

  temperature:
    type: str
    description: "Numerical experimental temperature exactly as reported in the kinetic experiment"
    required: false

compare_fields: [formula, activity, syngony, surface, length, length_unit, width, width_unit, depth, depth_unit, reaction_type, km_value, km_unit, vmax_value, vmax_unit, ph, temperature, c_min, c_min_unit, c_max, c_max_unit, c_const, c_const_unit, ccat_value, ccat_unit]
float_tolerance: 0.05

row_converter:
  formula: [formula]
  activity: [activity]
  syngony: [syngony]
  length: [length]
  length_unit: [length_unit]
  width: [width]
  width_unit: [width_unit]
  depth: [depth]
  depth_unit: [depth_unit]
  surface: [surface]
  km_value: [km_value]
  km_unit: [km_unit]
  vmax_value: [vmax_value]
  vmax_unit: [vmax_unit]
  reaction_type: [reaction_type]
  c_min: [c_min]
  c_min_unit: [c_min_unit]
  c_max: [c_max]
  c_max_unit: [c_max_unit]
  c_const: [c_const]
  c_const_unit: [c_const_unit]
  ccat_value: [ccat_value]
  ccat_unit: [ccat_unit]
  ph: [ph]
  temperature: [temperature]