# ── Project-level settings ──────────────────────────────────────────────
project:
  log_level: "INFO"

# ── LLM Models ──────────────────────────────────────────────────────────
# Each model (student / teacher) has a provider: "ollama", "api", or "transformers".
# Provider-specific sub-sections (ollama, api, transformers) are required only
# when that provider is active. API keys are read from environment variables.

llm:
  # Student model — used for extraction and optimisation.
  student:
    provider: "api"
    model: "qwen/qwen3.5-27b"
    temperature: 0.0
    top_p: 0.1
    enable_cache: true
    timeout: 600
    rate_limit_delay: 10.0
    max_retries: 3

    api:
      max_tokens: 8192
      base_url: "https://openrouter.ai/api/v1"
      reasoning:
        enabled: false

  # Teacher model — used for generating demonstrations and feedback.
  teacher:
    provider: "api"
    model: "qwen/qwen3.5-397b-a17b"
    temperature: 1
    top_p: 0.9
    enable_cache: true
    timeout: 600
    rate_limit_delay: 10.0
    max_retries: 3

    api:
      max_tokens: 8192
      base_url: "https://openrouter.ai/api/v1"
      reasoning:
        enabled: false

# ── Document Ingestion ──────────────────────────────────────────────────
parsing:
  parser: "gemini"  # Options: "marker", "gemini", or "gemini_visual"
  overwrite: false

  gemini:
    model_name: "gemini-3-flash-preview"
    upload_timeout: 300
    safety_settings: true

  # Example config for gemini_visual parser:
  # gemini_visual:
  #   task_config_path: "/home/arutamonofu/dev/fast/aee_visual/configs/schema_nanozymes.yaml"
  #   pipeline_config_path: "/home/arutamonofu/dev/fast/aee_visual/configs/pipeline.yaml"
  #   gemini:
  #     model_name: "gemini-3-flash-preview"
  #     upload_timeout: 300
  #     safety_settings: true

# ── File Paths ──────────────────────────────────────────────────────────
# All paths are resolved relative to the project root.
paths:
  pdf_dir: "data/pdf"
  parsed_dir: "data/parsed"
  ground_truth_dir: "data/ground_truth"
  splits_file: "data/splits/nanozymes_pilot.json"
  agents_dir: "data/agents"
  extractions_dir: "data/extractions"

# ── Optimisation (DSPy MIPROv2) ────────────────────────────────────────
optimization:
  total_load: 10
  train_split: 9
  num_candidates: 8
  num_trials: 25
  max_bootstrapped_demos: 0
  max_labeled_demos: 1
  minibatch: true
  minibatch_size: 4
  view_data_batch_size: 1
  metric_threshold: 1.0
  init_temperature: 1.0
  random_seed: 42
  use_cache: true
  verbose: true
  max_errors: 3
  save_llm_history: true
  llm_history_dir: "logs/llm_history"

# ── Task Reference ──────────────────────────────────────────────────────
# task.name determines which task YAML is loaded from config/tasks/<name>.yaml.
# Note: compare_fields and float_tolerance are defined in the task YAML,
# NOT in this system config.
task:
  name: "nanozymes"
  initial_instruction_file: "config/initial_instructions/nanozymes_pilot.txt"

# ── Extraction Runtime ──────────────────────────────────────────────────
extraction:
  enable_cache: false
  save_llm_history: false
  llm_history_dir: "logs/llm_history"

# ── Caching ─────────────────────────────────────────────────────────────
cache:
  disk_size_limit_bytes: 30000000000  # 30 GB
  memory_max_entries: 1000000

# ── Circuit Breaker (LLM call resilience) ───────────────────────────────
circuit_breaker:
  failure_threshold: 8
  reset_timeout: 30.0
  half_open_max_calls: 1