# Example system configuration for AutoEvoExtractor.
# Copy this file and adapt for your environment (dev.yaml, prod.yaml, etc.).
#
# Configuration loading:
#   - CLI: --config config/systems/your_env.yaml
#   - Env: AEE_ENV=dev (loads config/systems/dev.yaml)
#
# Secrets (API keys, URLs) go in .env — never in YAML.

# ── Project-level settings ──────────────────────────────────────────────
project:
  log_level: "INFO"

# ── LLM Models ──────────────────────────────────────────────────────────
# Each model (student / teacher) has a provider: "ollama", "api", or "transformers".
# Provider-specific sub-sections (ollama, api, transformers) are required only
# when that provider is active. API keys are read from environment variables.

llm:
  # Student model — used for extraction and optimisation.
  student:
    provider: "transformers"
    model: "qwen/qwen3.5-27b"
    temperature: 0.1
    top_p: 0.85
    max_retries: 5
    enable_cache: true

    transformers:
      device_map: "auto"
      torch_dtype: "float16"
      load_in_4bit: false
      load_in_8bit: true
      trust_remote_code: true
      max_new_tokens: 2048
      attn_implementation: "flash_attention_2"
      repetition_penalty: 1.05
      no_repeat_ngram_size: 4

  # Teacher model — used for generating demonstrations and feedback.
  teacher:
    provider: "api"
    model: "qwen/qwen3.5-397b-a17b"
    timeout: 600
    max_retries: 2
    temperature: 1
    rate_limit_delay: 10.0
    top_p: 0.9
    enable_cache: true

    api:
      max_tokens: 8192
      base_url: "https://openrouter.ai/api/v1"
      reasoning:
        enabled: true

# ── Document Ingestion ──────────────────────────────────────────────────
parsing:
  parser: "gemini"  # Options: "marker" or "gemini"
  overwrite: false

  gemini:
    model_name: "gemini-3-flash-preview"
    upload_timeout: 300
    safety_settings: true

# ── File Paths ──────────────────────────────────────────────────────────
# All paths are resolved relative to the project root.
paths:
  pdf_dir: "data/pdf"
  parsed_dir: "data/parsed"
  ground_truth_dir: "data/ground_truth"
  splits_file: "data/splits/nanozymes.json"
  agents_dir: "data/agents"
  extractions_dir: "data/extractions"

# ── Optimisation (DSPy MIPROv2) ────────────────────────────────────────
optimization:
  total_load: 3
  train_split: 3
  num_candidates: 20
  num_trials: 3
  max_bootstrapped_demos: 1
  max_labeled_demos: 1
  minibatch: false
  minibatch_size: 10
  view_data_batch_size: 3
  metric_threshold: 1.0
  init_temperature: 0.5
  random_seed: 42
  use_cache: true
  verbose: true
  max_errors: 20
  save_llm_history: true
  llm_history_dir: "logs/llm_history"

# ── Task Reference ──────────────────────────────────────────────────────
# task.name determines which task YAML is loaded from config/tasks/<name>.yaml.
# Note: compare_fields and float_tolerance are defined in the task YAML,
# NOT in this system config.
task:
  name: "nanozymes"
  initial_instruction_file: "config/initial_instructions/nanozymes_nanominer.txt"

# ── Extraction Runtime ──────────────────────────────────────────────────
extraction:
  enable_cache: false
  save_llm_history: false
  llm_history_dir: "logs/llm_history"

# ── Caching ─────────────────────────────────────────────────────────────
cache:
  disk_size_limit_bytes: 30000000000  # 30 GB
  memory_max_entries: 1000000

# ── Circuit Breaker (LLM call resilience) ───────────────────────────────
circuit_breaker:
  failure_threshold: 8
  reset_timeout: 30.0
  half_open_max_calls: 1
