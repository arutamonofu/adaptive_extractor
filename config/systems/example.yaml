# config/systems/example.yaml

project:
  log_level: "INFO"

llm:
  student:
    use_ollama: true
    model: "mistral-small3.1-24b-128k:latest"
    timeout: 600
    max_retries: 5
    temperature: 0.0
    rate_limit_delay: 10.0
    top_p: 0.1
    repeat_penalty: 1.2
    repeat_last_n: 2048
    enable_cache: true
    ollama:
      num_ctx: 32000
      num_predict: 2048
      repeat_penalty: 1.2
      repeat_last_n: 2048
      stream: true
    non_ollama:
      max_tokens: 4096
      # base_url: "https://openrouter.ai/api/v1"

  teacher:
    use_ollama: true
    model: "gpt-oss:20b"
    timeout: 600
    max_retries: 2
    temperature: 0.5
    rate_limit_delay: 10.0
    top_p: 0.9
    repeat_penalty: 1.1
    repeat_last_n: 512
    enable_cache: true
    ollama:
      num_ctx: 32000
      num_predict: 4096
      repeat_penalty: 1.1
      repeat_last_n: 512
      stream: true
    non_ollama:
      max_tokens: 8192
      # base_url: "https://api.openai.com/v1"

parsing:
  parser: "gemini"  # Options: "marker" or "gemini"
  overwrite: false

  # Note: Marker settings are defined in src/aee/infrastructure/parsers/marker_config.py

  gemini:
    model_name: "gemini-3-flash-preview"
    upload_timeout: 300
    safety_settings: true

paths:
  pdf_dir: "data/pdf"
  parsed_dir: "data/parsed"
  ground_truth_dir: "data/ground_truth"
  splits_file: "data/splits/nanozymes.json"
  agents_dir: "data/agents"
  extractions_dir: "data/extractions"

optimization:
  total_load: 3
  train_split: 3
  num_candidates: 20
  num_trials: 3
  max_bootstrapped_demos: 1
  max_labeled_demos: 1
  minibatch: false
  minibatch_size: 10
  view_data_batch_size: 3
  metric_threshold: 1.0
  init_temperature: 0.5
  random_seed: 42
  use_cache: true
  verbose: true
  max_errors: 20
  save_llm_history: true
  llm_history_dir: "logs/llm_history"

task:
  name: "nanozymes"
  initial_instruction_file: "config/initial_instructions/nanozymes_nanominer.txt"
  evaluation:
    compare_fields:
      - "formula"
      - "activity"
      - "reaction_type"
      - "ph"
      - "temperature"
      - "surface"
      - "syngony"
      - "length"
      - "width"
      - "depth"
      - "km_value"
      - "vmax_value"
      - "c_min"
      - "c_max"
      - "c_const"
      - "ccat_value"
      - "km_unit"
      - "vmax_unit"
      - "c_const_unit"
      - "ccat_unit"
    float_tolerance: 0.05
    enable_semantic_judge: true

extraction:
  enable_cache: false

cache:
  disk_size_limit_bytes: 30000000000  # 30 GB
  memory_max_entries: 1000000

circuit_breaker:
  failure_threshold: 8
  reset_timeout: 30.0
  half_open_max_calls: 1
